# golangci-lint v2 configuration for go-siros-cli
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: false

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - unconvert
  disable:
    - exhaustive
    - unparam
    - gocritic
    - gosec
    - unused
    - errcheck  # Disabled: CLI apps have many fire-and-forget patterns

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
  goimports:
    local-prefixes: github.com/sirosfoundation/go-siros-cli

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files
    - path: _test\.go
      linters:
        - govet
    # E2E tests
    - path: e2e/
      linters:
        - govet

output:
  formats:
    colored-line-number: {}
  print-linter-name: true
  sort-results: true
